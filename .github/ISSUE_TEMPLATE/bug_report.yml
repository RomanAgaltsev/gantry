name: Bug report
description: Report a problem with gantry
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including the forge (gitlab) and executor (compose-over-ssh) if relevant.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal config or commands that reproduce the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: gantry version
      placeholder: v0.1.0
    validations:
      required: true
  - type: input
    id: go-version
    attributes:
      label: Go version
      placeholder: go1.26.2
    validations:
      required: true
