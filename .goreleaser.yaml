version: 2
builds:
  - main: ./cmd/gantry
    binary: gantry
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/RomanAgaltsev/gantry/internal/cli.Version={{ .Version }}
archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: "checksums.txt"
